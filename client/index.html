<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summon Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-interface">
        <div id="creature-display">
            <h2>Creatures</h2>
            <div id="creature-list">
                <!-- Dynamically populated creature display will go here -->
            </div>
        </div>
        <div id="battle-arena">
            <h2>Battle Arena</h2>
            <div id="combat-area">
                <!-- Battle interface will go here -->
            </div>
        </div>
        <div id="gacha-system">
            <h2>Gacha System</h2>
            <button id="gacha-button">Summon a Creature</button>
            <div id="gacha-result">
                <!-- Result of gacha summon will go here -->
            </div>
        </div>
        <div id="multiplayer-features">
            <h2>Multiplayer Features</h2>
            <div id="lobby">
                <!-- Lobby for multiplayer will go here -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
